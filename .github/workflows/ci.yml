name: CI

on:
  push:
    branches: [main]
  pull_request:

env:
  CARGO_TERM_COLOR: always

jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust toolchain
        run: |
          rustup show
          rustup component add rustfmt clippy
      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
      - name: Format check
        run: cargo fmt --all -- --check
      - name: Clippy (deny warnings)
        # deny-warnings semantics live here (clippy-driver wraps rustc, so this
        # catches rustc warnings too across all targets). Kept off the global env
        # so build/test don't recompile under a different fingerprint.
        run: cargo clippy --workspace --all-targets -- -D warnings
      - name: Test
        run: cargo test --workspace
      - name: No litellm dependency
        run: |
          # Capture output AND exit code first: a broken manifest makes
          # `cargo tree` fail with no stdout, which previously slipped past the
          # grep and printed OK (fail-open). Fail the gate on any cargo error.
          set -o pipefail
          if ! tree_out=$(cargo tree --workspace 2>&1); then
            echo "FAIL: cargo tree errored — cannot verify clean-room requirement"
            echo "$tree_out"
            exit 1
          fi
          if printf '%s\n' "$tree_out" | grep -qi litellm; then
            echo "FAIL: litellm found in dependency tree (clean-room requirement)"; exit 1
          fi
          echo "OK: no litellm dependency"

  docker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Docker build
        run: docker build -t moaray:ci .
