# moaray example config. Secrets are referenced by env var, never inlined.
server:
  bind: "0.0.0.0"
  port: 8080
  request_timeout_ms: 120000
  max_body_bytes: 1048576      # 1 MiB inbound body cap
  shutdown_grace_ms: 15000
  default_max_tokens: 4096     # injected for anthropic when caller omits it
  moa_expose_metadata: false   # emit the `moaray` per-arm debug field (off in prod)
  # Per-upstream circuit breaker (applied per upstream_id). Defaults shown.
  breaker:
    failure_threshold: 5       # consecutive failures that trip the breaker open
    open_ms: 30000             # cool-down before a half-open probe is allowed
    half_open_successes: 1     # consecutive probe successes needed to close again
  # Upstream retry policy. OFF by default: a generation request is not naturally
  # idempotent, so opt in deliberately. Even enabled, ONLY connect failures
  # (request never sent) are retried, and streaming is never retried.
  retry:
    enabled: false
    max_retries: 2
    backoff_ms: 100            # doubles each attempt
  # Persistent usage/cost accounting store (v0.2-P1). OMIT this block to disable
  # accounting entirely (a NullSink — zero overhead). When present, one row per
  # upstream call (each MoA proposer, the aggregator, each non-stream passthrough)
  # is written to SQLite with raw token counts + a price snapshot + a computed
  # cost. Best-effort/telemetry-grade: under overload rows are dropped, never
  # blocking a user request. These knobs are RESTART-FROZEN (a hot reload warns
  # and keeps the running store). Per-model PRICES below are hot-reloadable.
  # usage_store:
  #   path: /var/lib/moaray/usage.db   # SQLite file (created if absent; WAL mode)
  #   channel_capacity: 8192           # hot-path → writer queue depth (drop-on-full)
  #   batch_size: 256                  # rows per write transaction

auth:
  keys:
    - id: local-dev
      key_env: MOARAY_INBOUND_KEY   # bearer token callers must present
      allow_models: [mock-gpt, "moa/arm-e"]
      # Optional inbound per-key token-bucket limit (omit for unlimited).
      # rate_limit: {rps: 50, burst: 100}

models:
  - name: mock-gpt
    provider_type: openai-compat
    base_url: http://mock-upstream:9000   # docker-compose service
    api_key_env: MOCK_UPSTREAM_KEY
    upstream_id: mock-gpt                  # OPTIONAL low-cardinality metrics label
    # NOTE: `upstream_id` is only a human-facing label (Prometheus `upstream_id`
    # + the client `moaray` debug field); it defaults to `name`. It does NOT
    # decide which models share a rate-limit bucket / breaker. Bucket sharing is
    # keyed by the upstream identity (provider_type + base_url + api_key_env), so
    # two models with the same triple share one bucket (no per-upstream-cap
    # bypass), and renaming a model or its upstream_id preserves limiter/breaker
    # state across a hot reload (SIGHUP).
    # Optional per-upstream limits, shared by passthrough + MoA arms that resolve
    # to the same upstream identity (MoA fan-out cannot bypass them).
    # rate_limit: {rps: 100, burst: 200}
    # max_concurrency: 64                 # in-flight request ceiling
    # Optional per-model token prices in USD per 1M tokens. Set BOTH to price this
    # model's usage rows; omit either and rows store tokens with cost=NULL and
    # status=unpriced (and bump moaray_usage_unpriced_total). Hot-reloadable.
    # price_prompt_per_mtok_usd: 0.15
    # price_completion_per_mtok_usd: 0.60

# MoA recipes: fan-out to the proposers in parallel, then fuse with the
# aggregator. Activated in Phase 2. Call them via `model: "moa/<recipe>"`.
recipes:
  arm-e:
    proposers: [mock-gpt]
    aggregator: mock-gpt
    strategy: concat-synthesize   # or quorum-judge
    arm_timeout_ms: 60000
    quorum: 1                      # proceed once >= quorum proposers succeed
